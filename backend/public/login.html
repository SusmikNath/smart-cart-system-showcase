<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Scan-N-Go | Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0c0f;
      --surface: #111418;
      --border: #1e2228;
      --green: #00e676;
      --green-dim: #00e67615;
      --text: #e8eaed;
      --muted: #6b7280;
      --red: #ef4444;
      --mono: 'Space Mono', monospace;
      --sans: 'DM Sans', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .shell {
      width: 100%;
      max-width: 430px;
    }

    .brand {
      text-align: center;
      margin-bottom: 20px;
    }

    .brand-logo {
      font-family: var(--mono);
      color: var(--green);
      letter-spacing: 2px;
      font-size: 18px;
      margin-bottom: 8px;
    }

    .brand-sub {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 28px 24px;
    }

    .title {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 22px;
      line-height: 1.6;
    }

    .field {
      margin-bottom: 14px;
    }

    .label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 8px;
      font-family: var(--mono);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 13px 14px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input:focus {
      border-color: var(--green);
    }

    .btn {
      width: 100%;
      margin-top: 8px;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: var(--green);
      color: #000;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s, background 0.2s;
    }

    .btn:hover {
      background: #00ff84;
      transform: translateY(-1px);
    }

    .btn:disabled {
      background: #2a2f36;
      color: var(--muted);
      cursor: not-allowed;
      transform: none;
    }

    .helper {
      margin-top: 18px;
      padding: 14px;
      border-radius: 12px;
      background: var(--green-dim);
      border: 1px solid #00e67620;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.7;
    }

    .helper strong {
      color: var(--green);
    }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--red);
      color: #fff;
      padding: 12px 18px;
      border-radius: 8px;
      font-size: 13px;
      transition: transform 0.3s ease;
      z-index: 999;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    .quick-users {
      margin-top: 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .quick-chip {
      padding: 8px 10px;
      border-radius: 999px;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 11px;
      font-family: var(--mono);
      cursor: pointer;
    }

    .quick-chip:hover {
      border-color: var(--green);
      color: var(--green);
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="brand">
      <div class="brand-logo">⚡ SCAN-N-GO</div>
      <div class="brand-sub">Smart cart login for your tech fest demo</div>
    </div>

    <div class="card">
      <div class="title">Welcome</div>
      <div class="subtitle">
        Login with your mobile number, then enter your cart and start shopping.
      </div>

      <div class="field">
        <label class="label">Name</label>
        <input class="input" id="nameInput" type="text" placeholder="Enter your name" />
      </div>

      <div class="field">
        <label class="label">Mobile Number</label>
        <input class="input" id="mobileInput" type="tel" maxlength="10" placeholder="Enter 10-digit mobile number" />
      </div>

      <button class="btn" id="loginBtn">Login →</button>

      <div class="quick-users">
        <button class="quick-chip" onclick="fillDemo('Roni','9876543210')">Roni</button>
        <button class="quick-chip" onclick="fillDemo('Aarav','9123456780')">Aarav</button>
        <button class="quick-chip" onclick="fillDemo('Diya','9988776655')">Diya</button>
      </div>

      <div class="helper">
        <strong>Demo tip:</strong> after login, you’ll be redirected to the cart page.
        Then enter a cart ID like <strong>CART_001</strong> and start the session.
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="/js/auth.js"></script>
  <script>
    const loginBtn = document.getElementById("loginBtn");
    const mobileInput = document.getElementById("mobileInput");
    const nameInput = document.getElementById("nameInput");

    function showToast(msg) {
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.classList.add("show");
      setTimeout(() => t.classList.remove("show"), 3000);
    }

    function fillDemo(name, mobile) {
      nameInput.value = name;
      mobileInput.value = mobile;
    }

    async function doLogin() {
      const mobile = mobileInput.value.trim();
      const name = nameInput.value.trim() || "Customer";

      if (!/^[6-9]\d{9}$/.test(mobile)) {
        showToast("Enter a valid 10-digit mobile number");
        return;
      }

      loginBtn.disabled = true;
      loginBtn.textContent = "Logging in...";

      try {
        const result = await window.Auth.login(mobile, name);

        if (!result.success) {
          showToast(result.message || "Login failed");
          loginBtn.disabled = false;
          loginBtn.textContent = "Login →";
          return;
        }

        window.location.href = "/cart.html";
      } catch (err) {
        showToast("Network error. Please try again.");
        loginBtn.disabled = false;
        loginBtn.textContent = "Login →";
      }
    }

    loginBtn.addEventListener("click", doLogin);

    mobileInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") doLogin();
    });

    nameInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") doLogin();
    });

    if (window.Auth.isLoggedIn()) {
      window.location.href = "/cart.html";
    }
  </script>
</body>
</html>
